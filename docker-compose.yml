services:
  backend:
    image: node:22
    working_dir: /app/backend
    volumes:
      - ./:/app
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    command: >
      sh -c "npm install &&
             npm run prisma:generate &&
             npm run prisma:deploy &&
             npm run seed &&
             npm run dev"

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://backend:4000/api"
    depends_on:
      - backend
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
